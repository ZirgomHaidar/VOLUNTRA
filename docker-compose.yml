services:
  db:
    image: postgis/postgis:15-3.3
    container_name: voluntra_db
    environment:
      POSTGRES_USER: voluntra
      POSTGRES_PASSWORD: voluntrapassword
      POSTGRES_DB: voluntra_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voluntra -d voluntra_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: voluntra_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
